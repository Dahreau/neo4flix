# Angular's router handles routes like /movies/xyz client-side - nginx must fall
# back to index.html for any path it doesn't have a file for, otherwise a direct
# hit or refresh on a deep link 404s.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
