version: '3.8'

# JWT_SECRET and NEO4J_PASSWORD come from a .env file next to this compose file
# (docker-compose reads .env automatically) - never hardcoded here. Copy
# .env.example to .env once (see 00-getting-started.md); .env itself is
# gitignored, .env.example is the tracked template with no real secret in it.

services:
  neo4j:
    image: neo4j:5
    container_name: neo4flix_db
    ports:
      - 7474:7474
      - 7687:7687
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  movie-service:
    build: ./movie-service
    container_name: neo4flix_movie_service
    ports:
      - 8091:8091
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      neo4j:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: neo4flix_user_service
    ports:
      - 8092:8092
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      neo4j:
        condition: service_healthy

  rating-service:
    build: ./rating-service
    container_name: neo4flix_rating_service
    ports:
      - 8093:8093
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      neo4j:
        condition: service_healthy

  recommendation-service:
    build: ./recommendation-service
    container_name: neo4flix_recommendation_service
    ports:
      - 8094:8094
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ../frontend
    container_name: neo4flix_frontend
    ports:
      - 4201:80
    depends_on:
      - movie-service
      - user-service
      - rating-service
      - recommendation-service