spring.application.name=user-service
server.port=8092

# Default targets localhost for running the jar directly; docker-compose overrides
# this to the "neo4j" service name so containers can resolve each other by DNS.
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=${NEO4J_PASSWORD:neo4flix_dev}

# Shared HMAC secret across services for JWT validation. The literal default is a dev
# fallback only - docker-compose sets JWT_SECRET explicitly so all 3 services agree.
jwt.secret=${JWT_SECRET:change-me-neo4flix-dev-secret-key-minimum-256-bits-long-please}
jwt.expiration-ms=86400000
